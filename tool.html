<style>
:root {
  --bg: #0a0a0b;
  --surface: #111213;
  --card: #181919;
  --border: #2a2b2c;
  --ink: #f0f0f2;
  --body: #d4d4d6;
  --mute: #999;
  --green: #0b6b33;
  --felt: #0d7a3a;
  --frame: #1a1208;
  --yellow: #ffc533;
  --blue: #57c1ff;
  --red: #ff5555;
  --cyan: #59d499;
  --radius: 8px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  height: 100vh; height: 100dvh;
  display: flex; flex-direction: column;
  overflow: hidden;
  user-select: none; -webkit-user-select: none;
}
#header {
  display: flex; background: var(--surface);
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
#tabs {
  display: flex; gap: 4px; padding: 10px 12px;
  overflow-x: auto; flex: 1; min-width: 0;
  -webkit-mask-image: linear-gradient(to right, #000 88%, transparent);
  mask-image: linear-gradient(to right, #000 88%, transparent);
}
#tabs::-webkit-scrollbar { display: none; }
.tab-tools {
  display: flex; gap: 8px; padding: 8px 12px;
  align-items: center; flex-shrink: 0;
}
.tab {
  padding: 8px 16px; border-radius: var(--radius);
  background: transparent; border: 1px solid var(--border);
  color: var(--body); font-size: 14px; cursor: pointer;
  white-space: nowrap; transition: all .15s;
}
.tab:hover { background: var(--card); }
.tab:active { transform: scale(0.97); }
.tab.active { background: var(--yellow); color: #000; border-color: var(--yellow); font-weight: 600; }
#main {
  flex: 1; display: flex; flex-direction: column;
  min-height: 0; position: relative;
}
#canvasWrap {
  flex: 1; min-height: 0; display: flex;
  align-items: center; justify-content: center;
  padding: 4px;
}
canvas { display: block; }
#panel {
  flex-shrink: 0; padding: 10px 12px;
  background: var(--surface); border-top: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 8px;
}
#controls { transition: opacity .12s; }
#info {
  display: flex; flex-wrap: wrap; gap: 4px 10px;
  line-height: 1.4;
}
.info-tag { font-size: 12px; color: var(--mute); }
.info-tag b { color: var(--ink); font-size: 13px; }
.info-tag.primary b { color: var(--yellow); }
#controls {
  display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
}
.ctrl-group { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.ctrl-group + .ctrl-group { margin-left: 10px; padding-left: 10px; border-left: 1px solid var(--border); }
.btn {
  padding: 7px 14px; border-radius: var(--radius);
  background: var(--card); border: 1px solid var(--border);
  color: var(--body); font-size: 13px; cursor: pointer;
  font-family: inherit; transition: all .15s;
}
.btn:hover { border-color: var(--yellow); color: var(--ink); }
.btn:active { transform: scale(0.95); opacity: 0.85; }
.btn.active { background: var(--yellow); color: #000; border-color: var(--yellow); }
.btn.warn { border-color: var(--red); color: var(--red); }
.score { color: var(--yellow); font-weight: 600; font-size: 14px; margin-left: auto; }
#lang-sel { background: var(--card); border: 1px solid var(--border); color: var(--body); font-size: 12px; padding: 4px 6px; border-radius: var(--radius); cursor: pointer; }
#lang-sel:focus { outline: none; border-color: var(--yellow); }
#faq-btn { width: 28px; height: 28px; border-radius: 50%; background: var(--card); border: 1px solid var(--border); color: var(--yellow); font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; }
#faq-btn:hover { background: var(--yellow); color: #000; }
#faq { position: fixed; inset: 0; z-index: 999; background: var(--bg); overflow-y: auto; padding: 20px 20px 60px; display: none; animation: fadeIn .2s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
.faq-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; position: sticky; top: 0; background: var(--bg); padding: 8px 0; z-index: 1; }
.faq-header h2 { font-size: 20px; color: var(--ink); }
.faq-close { background: none; border: none; color: var(--mute); font-size: 28px; cursor: pointer; padding: 4px 12px; }
.faq-close:hover { color: var(--ink); }
.faq-body section { margin: 20px 0; padding: 16px; background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); }
.faq-body h3 { color: var(--yellow); font-size: 16px; margin-bottom: 10px; }
.faq-canvas { display: block; width: 100%; max-width: 420px; border-radius: 4px; margin: 10px 0; background: var(--green); }
.faq-text { color: var(--body); font-size: 13px; line-height: 1.7; }
.faq-text b { color: var(--ink); }
.faq-text ul { padding-left: 16px; margin: 4px 0; }
.faq-text li { margin: 4px 0; }
.faq-general { padding: 16px; background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 16px; }
.faq-general h3 { color: var(--cyan); font-size: 15px; margin-bottom: 8px; }
@media (min-width: 768px) {
  #panel { flex-direction: row; align-items: center; }
  #info { flex: 1; }
  #controls { flex: 0 0 auto; justify-content: flex-end; }
  .tab { padding: 10px 20px; font-size: 15px; }
}
@media (max-width: 380px) {
  .tab { padding: 6px 10px; font-size: 12px; }
  .btn { padding: 5px 10px; font-size: 12px; }
  .info-tag { font-size: 11px; }
  .info-tag b { font-size: 12px; }
  .ctrl-group + .ctrl-group { margin-left: 6px; padding-left: 6px; }
}
</style>
</head>
<body>
<div id="faq">
  <div class="faq-header">
    <h2 id="faq-title"></h2>
    <button class="faq-close" onclick="document.getElementById('faq').style.display='none'">&times;</button>
  </div>
  <div class="faq-body" id="faq-body"></div>
</div>
<div id="header">
  <div id="tabs">
    <button class="tab active" data-tab="aim">瞄准</button>

    <button class="tab" data-tab="kick">解球</button>
    <button class="tab" data-tab="position">走位</button>
    <button class="tab" data-tab="devtest">偏差测试</button>
  </div>
  <div class="tab-tools">
    <select id="lang-sel" onchange="switchLang(this.value)">

</div>
<div id="main">
  <div id="canvasWrap"><canvas id="c"></canvas></div>
</div>
<div id="panel">
  <div id="info"></div>
  <div id="controls"></div>
</div>

let curLang = localStorage.getItem('bl-lang') || 'zh';

// --- Constants ---
const TABLE_W = 2540, TABLE_H = 1270;
const BALL_R = 28.5;
const POCKET_R = 52;
const RAIL_W = 50;
const MARGIN = 30;

let W, H, scale, ox, oy;
let dpr = window.devicePixelRatio || 1;

let targetBall = {x: TABLE_W*0.65, y: TABLE_H*0.4};

let dragging = null;

const POCKETS = [
  {x:0, y:0}, {x:TABLE_W/2, y:-10}, {x:TABLE_W, y:0},
  {x:0, y:TABLE_H}, {x:TABLE_W/2, y:TABLE_H+10}, {x:TABLE_W, y:TABLE_H}
];

// Aim sub-modes
let aimMode = 'ghost';
const AIM_MODES = ['ghost','overlap','tunnel','hitpt','cutline'];

};

// --- Resize ---
function resize() {
  const wrap = document.getElementById('canvasWrap');
  const maxW = wrap.clientWidth - 16;
  const maxH = wrap.clientHeight - 16;
  const aspect = (TABLE_W + MARGIN*2 + RAIL_W*2) / (TABLE_H + MARGIN*2 + RAIL_W*2);
  if (maxW / maxH > aspect) {
    H = maxH; W = H * aspect;
  } else {
    W = maxW; H = W / aspect;
  }
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  scale = (W - 16) / (TABLE_W + MARGIN*2 + RAIL_W*2);
  ox = W/2 - (TABLE_W/2)*scale;
  oy = H/2 - (TABLE_H/2)*scale;
  draw();
}
window.addEventListener('resize', resize);

// --- Coordinate transforms ---
function toScreen(p) { return {x: ox + p.x*scale, y: oy + p.y*scale}; }
function toTable(sx, sy) { return {x: (sx - ox)/scale, y: (sy - oy)/scale}; }
function dist(a,b) { return Math.sqrt((a.x-b.x)**2 + (a.y-b.y)**2); }
function angle(a,b) { return Math.atan2(b.y-a.y, b.x-a.x); }

// --- Ghost ball & geometry ---
function getGhostPos(cue, target, pocket) {
  const pk = POCKETS[pocket];
  const ang = Math.atan2(target.y - pk.y, target.x - pk.x);
  return {x: target.x + Math.cos(ang)*BALL_R*2, y: target.y + Math.sin(ang)*BALL_R*2};
}

function getCutAngle(cue, target, pocket) {
  const ghost = getGhostPos(cue, target, pocket);
  const pocketDir = Math.atan2(POCKETS[pocket].y - ghost.y, POCKETS[pocket].x - ghost.x);
  const aimDir = Math.atan2(ghost.y - cue.y, ghost.x - cue.x);
  let diff = Math.abs(pocketDir - aimDir);
  if (diff > Math.PI) diff = 2*Math.PI - diff;
  return diff;
}

function findBestPocket(cue, target) {
  let best = 0, bestScore = Infinity;
  const shotDir = Math.atan2(target.y - cue.y, target.x - cue.x);
  for (let i = 0; i < 6; i++) {
    const pocketDir = Math.atan2(POCKETS[i].y - target.y, POCKETS[i].x - target.x);
    let dirDiff = Math.abs(shotDir - pocketDir);
    if (dirDiff > Math.PI) dirDiff = 2*Math.PI - dirDiff;
    if (dirDiff > 1.4) continue;
    const cutAng = getCutAngle(cue, target, i);
    if (cutAng > 1.2) continue;
    const pocketDist = dist(target, POCKETS[i]);
    const score = cutAng * 2 + (pocketDist / TABLE_W) * 1.0 + dirDiff * 0.3;
    if (score < bestScore) { bestScore = score; best = i; }
  }
  return best;
}

function getOverlapD(cutAngle) {
  return 2 * BALL_R * Math.cos(cutAngle);
}

function getOverlapFraction(cutAngle) {
  const ratio = 1 - Math.sin(cutAngle);
  const eighths = Math.round(ratio * 8);
  if (eighths >= 8) return '8/8';
  if (eighths <= 0) return Math.round(ratio * 100) + '/100';
  return eighths + '/8';
}


function getThickness(cutAngle) {
  const deg = cutAngle * 180 / Math.PI;
  const t = L().thick;
  if (deg < 10) return t[0];
  if (deg < 25) return t[1];
  if (deg < 40) return t[2];
  if (deg < 55) return t[3];
  if (deg < 70) return t[4];
  return t[5];
}

// --- Reflection for kick shots ---
function reflectAcrossRail(p, rail) {
  if (rail === 'top') return {x: p.x, y: -p.y};
  if (rail === 'bottom') return {x: p.x, y: 2*TABLE_H - p.y};
  if (rail === 'left') return {x: -p.x, y: p.y};
  if (rail === 'right') return {x: 2*TABLE_W - p.x, y: p.y};
}

function lineRailIntersect(a, b, rail) {
  let x, y;
  if (rail === 'top') { y = 0; x = a.x + (b.x-a.x)*(0-a.y)/(b.y-a.y); }
  else if (rail === 'bottom') { y = TABLE_H; x = a.x + (b.x-a.x)*(TABLE_H-a.y)/(b.y-a.y); }
  else if (rail === 'left') { x = 0; y = a.y + (b.y-a.y)*(0-a.x)/(b.x-a.x); }
  else { x = TABLE_W; y = a.y + (b.y-a.y)*(TABLE_W-a.x)/(b.x-a.x); }
  if (x >= -1 && x <= TABLE_W+1 && y >= -1 && y <= TABLE_H+1) return {x,y};
  return null;
}

function solve1Rail(start, end) {
  const rails = ['top','bottom','left','right'];
  let best = null, bestDist = Infinity;
  for (const rail of rails) {
    const reflected = reflectAcrossRail(end, rail);
    const hit = lineRailIntersect(start, reflected, rail);
    if (hit) {
      const d = dist(start, hit) + dist(hit, end);
      if (d < bestDist) { bestDist = d; best = {points: [start, hit, end], rail}; }
    }
  }
  return best;
}

function solveAll1Rail(start, end) {
  const rails = ['top','bottom','left','right'];
  const results = [];
  for (const rail of rails) {
    const reflected = reflectAcrossRail(end, rail);
    const hit = lineRailIntersect(start, reflected, rail);
    if (hit) {
      const d = dist(start, hit) + dist(hit, end);
      results.push({points: [start, hit, end], rail, dist: d});
    }
  }
  return results.sort((a, b) => a.dist - b.dist);
}

function solveAll2Rail(start, end) {
  const railPairs = [['top','bottom'],['bottom','top'],['left','right'],['right','left'],
                     ['top','left'],['top','right'],['bottom','left'],['bottom','right'],
                     ['left','top'],['left','bottom'],['right','top'],['right','bottom']];
  const results = [];
  for (const [r1, r2] of railPairs) {
    const ref1 = reflectAcrossRail(end, r2);
    const ref2 = reflectAcrossRail(ref1, r1);
    const hit1 = lineRailIntersect(start, ref2, r1);
    if (!hit1) continue;
    const hit2 = lineRailIntersect(hit1, ref1, r2);
    if (!hit2) continue;
    const d = dist(start, hit1) + dist(hit1, hit2) + dist(hit2, end);
    results.push({points: [start, hit1, hit2, end], rails: [r1,r2], dist: d});
  }
  return results.sort((a, b) => a.dist - b.dist);
}

function solve2Rail(start, end) {
  const all = solveAll2Rail(start, end);
  return all.length > 0 ? all[0] : null;
}

function solveNRail(start, end, n) {
  const rails = ['top','bottom','left','right'];
  const results = [];
  function generateRailSeqs(len) {
    if (len === 1) return rails.map(r => [r]);
    const shorter = generateRailSeqs(len - 1);
    const seqs = [];
    for (const seq of shorter) {
      for (const r of rails) {
        if (r !== seq[seq.length - 1]) seqs.push([...seq, r]);
      }
    }
    return seqs;
  }
  const seqs = generateRailSeqs(n);
  for (const railSeq of seqs) {
    let reflected = end;
    for (let i = n - 1; i >= 0; i--) {
      reflected = reflectAcrossRail(reflected, railSeq[i]);
    }
    const hit1 = lineRailIntersect(start, reflected, railSeq[0]);
    if (!hit1) continue;
    const points = [start, hit1];
    let valid = true;
    for (let i = 1; i < n; i++) {
      let target = end;
      for (let j = n - 1; j >= i; j--) {
        target = reflectAcrossRail(target, railSeq[j]);
      }
      const hit = lineRailIntersect(points[i], target, railSeq[i]);
      if (!hit) { valid = false; break; }
      points.push(hit);
    }
    if (!valid) continue;
    points.push(end);
    let d = 0;
    for (let i = 0; i < points.length - 1; i++) d += dist(points[i], points[i+1]);
    results.push({points, rails: railSeq, dist: d, cushions: n});
  }
  return results.sort((a, b) => a.dist - b.dist);
}

// --- Diamond system ---
function getDiamondNum(p, rail) {
  if (rail === 'top' || rail === 'bottom') return p.x / TABLE_W * 8;
  return p.y / TABLE_H * 4;
}

function pointToSegmentDist(p, a, b) {
  const dx = b.x - a.x, dy = b.y - a.y;
  const len2 = dx*dx + dy*dy;
  if (len2 === 0) return dist(p, a);
  let t = ((p.x-a.x)*dx + (p.y-a.y)*dy) / len2;
  t = Math.max(0, Math.min(1, t));
  return dist(p, {x: a.x + t*dx, y: a.y + t*dy});
}

function pathBlocked(points, obstacles) {
  for (const ob of obstacles) {
    for (let i = 0; i < points.length - 1; i++) {
      if (pointToSegmentDist(ob, points[i], points[i+1]) < BALL_R * 2.5) return true;
    }
  }
  return false;
}

// --- Separation angle ---
// 基于真实台球物理：stun=90°法则，follow/draw根据切割角调整
// 参考方向：目标球运动方向为0°，stun垂直=90°
function getSeparationAngle(cutAngleDeg, spin) {
  if (spin === 'stun') return 90;
  const cutRad = cutAngleDeg * Math.PI / 180;
  if (spin === 'follow') {
    // follow使分离角<90°（母球跟进方向）
    // 直球(0°切)时跟进≈0°；大角度时效果减弱趋近90°
    const deflection = 30 * Math.cos(cutRad);
    return 90 - deflection;
  }
  if (spin === 'draw') {
    // draw使分离角>90°（母球回拉方向）
    // 直球(0°切)时回拉≈150°；大角度时效果减弱趋近90°
    const deflection = 60 * Math.cos(cutRad);
    return 90 + deflection;
  }
  return 90;
}

// --- Drawing ---
function drawTable() {
  ctx.save();
  ctx.translate(ox, oy);
  ctx.scale(scale, scale);
  // Frame
  ctx.fillStyle = '#1a1208';
  ctx.fillRect(-RAIL_W, -RAIL_W, TABLE_W + RAIL_W*2, TABLE_H + RAIL_W*2);
  // Felt
  ctx.fillStyle = '#0d7a3a';
  ctx.fillRect(0, 0, TABLE_W, TABLE_H);
  // Rail lines
  ctx.strokeStyle = '#15914a';
  ctx.lineWidth = 2;
  ctx.strokeRect(0, 0, TABLE_W, TABLE_H);
  // Diamonds on rails
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  for (let i = 1; i < 8; i++) {
    const x = TABLE_W * i / 8;
    ctx.beginPath(); ctx.arc(x, -RAIL_W/2, 4, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x, TABLE_H + RAIL_W/2, 4, 0, Math.PI*2); ctx.fill();
  }
  for (let i = 1; i < 4; i++) {
    const y = TABLE_H * i / 4;
    ctx.beginPath(); ctx.arc(-RAIL_W/2, y, 4, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(TABLE_W + RAIL_W/2, y, 4, 0, Math.PI*2); ctx.fill();
  }
  // Grid lines
  if (showGrid) {
    ctx.strokeStyle = 'rgba(255,255,255,0.25)';
    ctx.lineWidth = 2.5;
    for (let i = 1; i < 8; i++) {
      const x = TABLE_W * i / 8;
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, TABLE_H); ctx.stroke();
    }
    for (let i = 1; i < 4; i++) {
      const y = TABLE_H * i / 4;
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(TABLE_W, y); ctx.stroke();
    }
  }
  // Pockets
  ctx.fillStyle = '#111';
  for (const p of POCKETS) {
    ctx.beginPath(); ctx.arc(p.x, p.y, POCKET_R, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

function drawBall(p, color, label, glow) {
  ctx.save();
  ctx.translate(ox, oy);
  ctx.scale(scale, scale);
  if (glow) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, BALL_R * 1.6, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,197,51,0.15)';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(p.x, p.y, BALL_R * 1.25, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(255,197,51,0.5)';
    ctx.lineWidth = 2;
    ctx.stroke();
  }
  ctx.beginPath();
  ctx.arc(p.x, p.y, BALL_R, 0, Math.PI*2);
  ctx.fillStyle = color;
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.3)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  // Highlight
  ctx.beginPath();
  ctx.arc(p.x - BALL_R*0.3, p.y - BALL_R*0.3, BALL_R*0.25, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.fill();
  if (label) {
    ctx.fillStyle = '#fff';
    ctx.font = `${BALL_R*0.9}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(label, p.x, p.y);
  }
  ctx.restore();
}

function drawLine(a, b, color, width, dash) {
  ctx.save();
  ctx.translate(ox, oy);
  ctx.scale(scale, scale);
  ctx.beginPath();
  if (dash) ctx.setLineDash(dash);
  ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
  ctx.strokeStyle = color;
  ctx.lineWidth = width / scale;
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

function drawBouncePath(start, dir, totalLen, colorBase, alpha, label) {
  let remaining = totalLen;
  let pos = {x: start.x, y: start.y};
  let ang = dir;
  const segments = [];
  let bounces = 0;
  while (remaining > 1 && bounces <= 3) {
    const dx = Math.cos(ang), dy = Math.sin(ang);
    let minT = remaining, hitRail = null;
    if (dy < 0) { const t = -pos.y / dy; if (t > 0.5 && t < minT) { minT = t; hitRail = 'top'; }}
    if (dy > 0) { const t = (TABLE_H - pos.y) / dy; if (t > 0.5 && t < minT) { minT = t; hitRail = 'bottom'; }}
    if (dx < 0) { const t = -pos.x / dx; if (t > 0.5 && t < minT) { minT = t; hitRail = 'left'; }}
    if (dx > 0) { const t = (TABLE_W - pos.x) / dx; if (t > 0.5 && t < minT) { minT = t; hitRail = 'right'; }}
    const endPt = {x: pos.x + dx * minT, y: pos.y + dy * minT};
    segments.push({from: {...pos}, to: endPt, bounce: bounces});
    remaining -= minT;
    if (!hitRail || remaining <= 0) break;
    pos = endPt;
    if (hitRail === 'top' || hitRail === 'bottom') ang = -ang;
    else ang = Math.PI - ang;
    bounces++;
  }
  ctx.save();
  ctx.translate(ox, oy);
  ctx.scale(scale, scale);
  segments.forEach((seg, i) => {
    const a = i === 0 ? alpha : Math.max(alpha, 0.5);
    const color = colorBase + a + ')';
    ctx.beginPath();
    ctx.moveTo(seg.from.x, seg.from.y);
    ctx.lineTo(seg.to.x, seg.to.y);
    ctx.strokeStyle = color; ctx.lineWidth = 2.5;
    if (i > 0) ctx.setLineDash([8, 6]); else ctx.setLineDash([]);
    ctx.stroke();
    ctx.setLineDash([]);
    if (i > 0) {
      ctx.beginPath(); ctx.arc(seg.from.x, seg.from.y, 7, 0, Math.PI*2);
      ctx.fillStyle = '#fff'; ctx.fill();
      ctx.beginPath(); ctx.arc(seg.from.x, seg.from.y, 5, 0, Math.PI*2);
      ctx.fillStyle = colorBase + '1)'; ctx.fill();
    }
  });
  // Arrow at final point
  const last = segments[segments.length - 1];
  if (last) {
    const aDir = Math.atan2(last.to.y - last.from.y, last.to.x - last.from.x);
    const aLen = 16;
    ctx.beginPath();
    ctx.moveTo(last.to.x, last.to.y);
    ctx.lineTo(last.to.x - aLen*Math.cos(aDir-0.4), last.to.y - aLen*Math.sin(aDir-0.4));
    ctx.lineTo(last.to.x - aLen*Math.cos(aDir+0.4), last.to.y - aLen*Math.sin(aDir+0.4));
    ctx.closePath();
    ctx.fillStyle = colorBase + alpha + ')'; ctx.fill();
    if (label) {
      ctx.fillStyle = colorBase + '0.7)'; ctx.font = '28px sans-serif';
      ctx.fillText(label, last.to.x + 8, last.to.y + 8);
    }
  }
  ctx.restore();
}

function drawArrow(from, to, color) {
  ctx.save();
  ctx.translate(ox, oy);
  ctx.scale(scale, scale);
  const ang = Math.atan2(to.y-from.y, to.x-from.x);
  const len = 20;
  ctx.beginPath();
  ctx.moveTo(from.x, from.y); ctx.lineTo(to.x, to.y);
  ctx.strokeStyle = color; ctx.lineWidth = 2.5; ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(to.x, to.y);
  ctx.lineTo(to.x - len*Math.cos(ang-0.4), to.y - len*Math.sin(ang-0.4));
  ctx.lineTo(to.x - len*Math.cos(ang+0.4), to.y - len*Math.sin(ang+0.4));
  ctx.closePath();
  ctx.fillStyle = color; ctx.fill();
  ctx.restore();
}

function drawText(p, text, color, size) {
  ctx.save();
  ctx.translate(ox, oy);
  ctx.scale(scale, scale);
  ctx.font = `600 ${size || 24}px sans-serif`;
  ctx.fillStyle = color || '#fff';
  ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
  ctx.fillText(text, p.x, p.y - BALL_R - 8);
  ctx.restore();
}

function drawCircle(p, r, color, dash) {
  ctx.save();
  ctx.translate(ox, oy);
  ctx.scale(scale, scale);
  ctx.beginPath();
  if (dash) ctx.setLineDash(dash);
  ctx.arc(p.x, p.y, r, 0, Math.PI*2);
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

// --- Module: Aim ---
function drawAim() {
  drawTable();
  const pocket = selectedPocket;
  const ghost = getGhostPos(cueBall, targetBall, pocket);
  const cutAng = getCutAngle(cueBall, targetBall, pocket);
  const cutDeg = (cutAng * 180 / Math.PI).toFixed(1);
  const dVal = (getOverlapD(cutAng) / BALL_R).toFixed(2);
  const pk = POCKETS[pocket];

  // Pocket line
  drawLine(targetBall, pk, 'rgba(255,255,255,0.2)', 1.5, [8,6]);

  if (aimMode === 'ghost') {
    // Ghost ball
    ctx.save(); ctx.translate(ox, oy); ctx.scale(scale, scale);
    ctx.globalAlpha = 0.35;
    ctx.beginPath(); ctx.arc(ghost.x, ghost.y, BALL_R, 0, Math.PI*2);
    ctx.fillStyle = '#fff'; ctx.fill();
    ctx.globalAlpha = 1;
    ctx.restore();
    drawLine(cueBall, ghost, 'rgba(255,197,51,0.6)', 1.5, [10,5]);
    drawLine(ghost, pk, '#59d499', 1.5);
    // d-value label near ghost ball
    const dLabel = {x:(ghost.x+targetBall.x)/2, y:(ghost.y+targetBall.y)/2 - 35};
    drawText(dLabel, `${L().info.overlap} ${getOverlapFraction(cutAng)}`, '#ffc533', 18);
    // Stun separation line (90° from force direction, on cue ball's approach side)
    const ghostToPk = angle(ghost, pk);
    const ghostCross = Math.sin(ghostToPk - angle(cueBall, ghost));
    const sepAng = ghostToPk + (ghostCross > 0 ? -Math.PI/2 : Math.PI/2);
    const sepEnd = {x: ghost.x + Math.cos(sepAng)*150, y: ghost.y + Math.sin(sepAng)*150};
    drawLine(ghost, sepEnd, 'rgba(87,193,255,0.4)', 1.5, [6,4]);
  }
  else if (aimMode === 'overlap') {
    // Overlap method: show d-value
    ctx.save(); ctx.translate(ox, oy); ctx.scale(scale, scale);
    ctx.globalAlpha = 0.4;
    ctx.beginPath(); ctx.arc(ghost.x, ghost.y, BALL_R, 0, Math.PI*2);
    ctx.fillStyle = '#fff'; ctx.fill();
    ctx.globalAlpha = 1;
    // Draw overlap region
    const overlapD = getOverlapD(cutAng);
    if (overlapD > 0) {
      ctx.beginPath();
      ctx.arc(targetBall.x, targetBall.y, BALL_R, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,100,100,0.2)'; ctx.fill();
    }
    ctx.restore();
    drawLine(cueBall, ghost, 'rgba(255,197,51,0.5)', 1.5, [8,5]);
    // d-value label
    const mid = {x:(ghost.x+targetBall.x)/2, y:(ghost.y+targetBall.y)/2 - 40};
    drawText(mid, `${L().info.overlap} ${getOverlapFraction(cutAng)}`, '#ffc533', 22);
  }
  else if (aimMode === 'tunnel') {
    // Tunnel/corridor aiming
    const ang = angle(cueBall, ghost);
    const perpX = Math.cos(ang + Math.PI/2) * BALL_R;
    const perpY = Math.sin(ang + Math.PI/2) * BALL_R;
    drawLine({x:cueBall.x+perpX, y:cueBall.y+perpY}, {x:ghost.x+perpX, y:ghost.y+perpY}, 'rgba(255,197,51,0.4)', 1.5);
    drawLine({x:cueBall.x-perpX, y:cueBall.y-perpY}, {x:ghost.x-perpX, y:ghost.y-perpY}, 'rgba(255,197,51,0.4)', 1.5);
    // Center line
    drawLine(cueBall, ghost, 'rgba(255,197,51,0.7)', 2);
    // Ghost ball
    ctx.save(); ctx.translate(ox, oy); ctx.scale(scale, scale);
    ctx.globalAlpha = 0.3;
    ctx.beginPath(); ctx.arc(ghost.x, ghost.y, BALL_R, 0, Math.PI*2);
    ctx.strokeStyle = '#ffc533'; ctx.lineWidth = 2; ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.restore();
    drawLine(ghost, pk, '#59d499', 1.5);
  }
  else if (aimMode === 'hitpt') {
    // Collision point on target ball: the point where ghost ball touches target ball
    // This is on the side FACING the ghost ball (opposite to pocket direction)
    const ang2 = angle(targetBall, ghost);
    const hitX = targetBall.x + Math.cos(ang2) * BALL_R;
    const hitY = targetBall.y + Math.sin(ang2) * BALL_R;
    ctx.save(); ctx.translate(ox, oy); ctx.scale(scale, scale);
    ctx.beginPath(); ctx.arc(hitX, hitY, 6, 0, Math.PI*2);
    ctx.fillStyle = '#ff5555'; ctx.fill();
    ctx.restore();
    drawLine(cueBall, {x:hitX, y:hitY}, 'rgba(255,197,51,0.5)', 1.5, [8,5]);
    drawLine(targetBall, pk, '#59d499', 1.5);
  }
  else if (aimMode === 'cutline') {
    // Cut line on ball surface
    ctx.save(); ctx.translate(ox, oy); ctx.scale(scale, scale);
    const ang2 = angle(POCKETS[pocket], targetBall);
    // Vertical reference
    ctx.beginPath();
    ctx.moveTo(targetBall.x, targetBall.y - BALL_R);
    ctx.lineTo(targetBall.x, targetBall.y + BALL_R);
    ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 1.5; ctx.stroke();
    // Cut direction line
    ctx.beginPath();
    ctx.moveTo(targetBall.x + Math.cos(ang2)*BALL_R, targetBall.y + Math.sin(ang2)*BALL_R);
    ctx.lineTo(targetBall.x - Math.cos(ang2)*BALL_R, targetBall.y - Math.sin(ang2)*BALL_R);
    ctx.strokeStyle = '#ff5555'; ctx.lineWidth = 2; ctx.stroke();
    // Horizontal
    ctx.beginPath();
    ctx.moveTo(targetBall.x - BALL_R, targetBall.y);
    ctx.lineTo(targetBall.x + BALL_R, targetBall.y);
    ctx.strokeStyle = 'rgba(87,193,255,0.5)'; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.restore();
    drawLine(cueBall, ghost, 'rgba(255,197,51,0.4)', 1.5, [8,5]);
    drawLine(targetBall, pk, '#59d499', 1.5);
  }

  drawBall(targetBall, '#cc3333', '', dragging === 'target');
  drawBall(cueBall, '#ffffff', '', dragging === 'cue');

  // Highlight selected pocket
  ctx.save(); ctx.translate(ox, oy); ctx.scale(scale, scale);
  ctx.beginPath(); ctx.arc(pk.x, pk.y, POCKET_R + 8, 0, Math.PI*2);
  ctx.strokeStyle = '#ffc533'; ctx.lineWidth = 2.5; ctx.stroke();
  ctx.restore();

  // Info panel
  const distMm = dist(cueBall, targetBall);
  const li = L().info;
  infoEl.innerHTML = `<span class="info-tag primary">${li.angle} <b>${cutDeg}°</b></span><span class="info-tag">${li.dval} <b>${dVal}R</b></span><span class="info-tag">${li.overlap} <b>${getOverlapFraction(cutAng)}</b></span><span class="info-tag">${li.thick} <b>${getThickness(cutAng)}</b></span><span class="info-tag">${li.distance} <b>${(distMm/TABLE_H).toFixed(2)}${li.tw} (${(distMm/(BALL_R*2)).toFixed(0)}${li.bd})</b></span>`;
}

// --- Module: Train ---
function trainNewQuestion() {
  trainState.answered = false;
  trainState.userPt = null;
  // Random positions
  cueBall = {x: TABLE_W*0.15 + Math.random()*TABLE_W*0.3, y: TABLE_H*0.2 + Math.random()*TABLE_H*0.6};
  targetBall = {x: TABLE_W*0.5 + Math.random()*TABLE_W*0.35, y: TABLE_H*0.15 + Math.random()*TABLE_H*0.7};
  selectedPocket = findBestPocket(cueBall, targetBall);
  trainState.currentAngle = getCutAngle(cueBall, targetBall, selectedPocket) * 180 / Math.PI;
  draw();
}

function trainAnswer(rangeIdx) {
  if (trainState.answered) return;
  trainState.answered = true;
  trainState.total++;
  const ranges = [[0,15],[15,30],[30,45],[45,60],[60,90]];
  const [lo, hi] = ranges[rangeIdx];
  const correct = trainState.currentAngle >= lo && trainState.currentAngle < hi;
  if (correct) trainState.score++;
  trainState.lastCorrect = correct;
  trainState.lastRange = rangeIdx;
  draw();
  updateControls();
}

function drawTrain() {
  drawTable();
  const pocket = selectedPocket;
  const pk = POCKETS[pocket];
  drawLine(targetBall, pk, 'rgba(255,255,255,0.15)', 1.5, [8,6]);
  drawBall(targetBall, '#cc3333', '', dragging === 'target');
  drawBall(cueBall, '#ffffff', '', dragging === 'cue');
  // Highlight pocket
  ctx.save(); ctx.translate(ox, oy); ctx.scale(scale, scale);
  ctx.beginPath(); ctx.arc(pk.x, pk.y, POCKET_R+6, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(255,197,51,0.5)'; ctx.lineWidth = 2; ctx.stroke();
  ctx.restore();

  if (trainState.answered) {
    const ghost = getGhostPos(cueBall, targetBall, pocket);
    ctx.save(); ctx.translate(ox, oy); ctx.scale(scale, scale);
    ctx.globalAlpha = 0.4;
    ctx.beginPath(); ctx.arc(ghost.x, ghost.y, BALL_R, 0, Math.PI*2);
    ctx.fillStyle = '#fff'; ctx.fill();
    ctx.globalAlpha = 1;
    ctx.restore();
    drawLine(cueBall, ghost, 'rgba(255,197,51,0.5)', 1.5, [8,5]);
    drawLine(ghost, pk, '#59d499', 1.5);
    const angDeg = trainState.currentAngle.toFixed(1);
    drawText({x:TABLE_W/2, y:TABLE_H/2}, `${angDeg}°`, trainState.lastCorrect ? '#59d499' : '#ff5555', 36);
  }

  infoEl.innerHTML = `<span class="info-tag">${L().info.score} <b>${trainState.score}/${trainState.total}</b></span><span class="info-tag primary">${L().info.accuracy} <b>${trainState.total ? Math.round(trainState.score/trainState.total*100) : 0}%</b></span>`;
}

// --- Module: Hitpoint ---
function getSpinName() {
  return L().spin[spinPt.row][spinPt.col];
}

function getSpinType() {
  if (spinPt.row === 0) return 'follow';
  if (spinPt.row === 2) return 'draw';
  return 'stun';
}

function drawHitpoint() {
  drawTable();
  const pocket = selectedPocket;
  const ghost = getGhostPos(cueBall, targetBall, pocket);
  const cutAng = getCutAngle(cueBall, targetBall, pocket);
  const cutDeg = cutAng * 180 / Math.PI;
  const pk = POCKETS[pocket];

  drawLine(targetBall, pk, 'rgba(255,255,255,0.15)', 1.5, [8,6]);
  drawLine(cueBall, ghost, 'rgba(255,197,51,0.4)', 1.5, [8,5]);
  drawBall(targetBall, '#cc3333', '', dragging === 'target');
  drawBall(cueBall, '#ffffff', '', dragging === 'cue');

  // Separation angle + position arrow
  const cueToGhost = angle(cueBall, ghost);
  const targetToPocket = angle(ghost, pk);
  const spinType = getSpinType();
  const cross = Math.sin(targetToPocket - cueToGhost);
  let stunDir = targetToPocket + (cross > 0 ? -Math.PI/2 : Math.PI/2);
  const cutRad = cutAng;
  const hpFollowDeflect = 0.52 * Math.cos(cutRad);
  const hpDrawDeflect = 1.05 * Math.cos(cutRad);
  // Determine deflection direction: toward shot for follow, away for draw
  let toShot = cueToGhost - stunDir;
  if (toShot > Math.PI) toShot -= 2*Math.PI;
  if (toShot < -Math.PI) toShot += 2*Math.PI;
  const deflectSign = toShot > 0 ? 1 : -1;
  const followDir = stunDir + deflectSign * hpFollowDeflect;
  const drawDir = stunDir - deflectSign * hpDrawDeflect;
  let exitDir = stunDir;
  if (spinType === 'follow') exitDir = followDir;
  if (spinType === 'draw') exitDir = drawDir;
  const posLen = TABLE_H * 0.1 * powerLv * powerLv;
  // Draw all three separation lines with bounce
  const pl = L().posLabels;
  const allDirs = [{dir: followDir, color: 'rgba(255,120,80,', label: pl.follow}, {dir: stunDir, color: 'rgba(180,180,180,', label: pl.stun}, {dir: drawDir, color: 'rgba(120,200,255,', label: pl.draw}];
  allDirs.forEach(d => {
    const isActive = Math.abs(d.dir - exitDir) < 0.01;
    const alpha = isActive ? 0.8 : 0.35;
    drawBouncePath(ghost, d.dir, posLen, d.color, alpha, !isActive ? d.label : null);
  });

  // Draw large cue ball face (draggable)
  const ballViewR = 55;
  if (!ballViewPos) ballViewPos = {x: W - ballViewR - 20, y: ballViewR + 20};
  const bvX = ballViewPos.x;
  const bvY = ballViewPos.y;
  ctx.save();
  // Ball circle
  ctx.beginPath(); ctx.arc(bvX, bvY, ballViewR, 0, Math.PI*2);
  const grad = ctx.createRadialGradient(bvX - ballViewR*0.3, bvY - ballViewR*0.3, 2, bvX, bvY, ballViewR);
  grad.addColorStop(0, '#ffffff');
  grad.addColorStop(1, '#b0b0b0');
  ctx.fillStyle = grad; ctx.fill();
  ctx.strokeStyle = '#555'; ctx.lineWidth = 2; ctx.stroke();
  // Grid lines on ball
  ctx.strokeStyle = 'rgba(0,0,0,0.15)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(bvX - ballViewR, bvY); ctx.lineTo(bvX + ballViewR, bvY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(bvX, bvY - ballViewR); ctx.lineTo(bvX, bvY + ballViewR); ctx.stroke();
  // 9 points grid
  const spacing = ballViewR * 0.5;
  for (let r = 0; r < 3; r++) {
    for (let c = 0; c < 3; c++) {
      const px = bvX + (c-1)*spacing;
      const py = bvY + (r-1)*spacing;
      ctx.beginPath(); ctx.arc(px, py, 5, 0, Math.PI*2);
      if (r === spinPt.row && c === spinPt.col) {
        ctx.fillStyle = '#ff3333';
      } else {
        ctx.fillStyle = 'rgba(0,0,0,0.2)';
      }
      ctx.fill();
    }
  }
  // Active point highlight
  const apx = bvX + (spinPt.col-1)*spacing;
  const apy = bvY + (spinPt.row-1)*spacing;
  ctx.beginPath(); ctx.arc(apx, apy, 9, 0, Math.PI*2);
  ctx.strokeStyle = '#ff3333'; ctx.lineWidth = 2.5; ctx.stroke();
  ctx.restore();

  // Power indicator
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.font = '12px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(`力度 ${powerLv}/5`, bvX, bvY + ballViewR + 20);
  ctx.restore();

  // Calculate separation angles for all spin types
  const followDeflectDeg = 0.52 * Math.cos(cutRad) * 180 / Math.PI;
  const drawDeflectDeg = 1.05 * Math.cos(cutRad) * 180 / Math.PI;
  const stunSepDeg = 90;
  const followSepDeg = (90 - followDeflectDeg).toFixed(0);
  const drawSepDeg = (90 + drawDeflectDeg).toFixed(0);
  let sepRad = Math.abs(exitDir - targetToPocket);
  if (sepRad > Math.PI) sepRad = 2*Math.PI - sepRad;
  const currentSepDeg = (sepRad * 180 / Math.PI).toFixed(1);
  const hi = L().info;
  infoEl.innerHTML = `<span class="info-tag">${hi.spin} <b>${getSpinName()}</b></span><span class="info-tag">${hi.power} <b>${powerLv}/5</b></span><span class="info-tag primary">${hi.cutAngle} <b>${cutDeg.toFixed(1)}°</b></span><span class="info-tag primary">${hi.curSep} <b>${currentSepDeg}°</b></span><span class="info-tag">${L().btn.follow}<b>${followSepDeg}°</b> ${L().btn.stun}<b>90°</b> ${L().btn.draw}<b>${drawSepDeg}°</b></span>`;
}

// --- Module: Kick ---
function drawKick() {
  drawTable();
  // Draw diamond numbers
  ctx.save(); ctx.translate(ox, oy); ctx.scale(scale, scale);
  ctx.font = '18px sans-serif'; ctx.fillStyle = 'rgba(255,255,255,0.6)'; ctx.textAlign = 'center';
  for (let i = 0; i <= 8; i++) {
    ctx.fillText(i.toString(), TABLE_W*i/8, -RAIL_W - 5);
    ctx.fillText(i.toString(), TABLE_W*i/8, TABLE_H + RAIL_W + 18);
  }
  for (let i = 0; i <= 4; i++) {
    ctx.fillText(i.toString(), -RAIL_W - 12, TABLE_H*i/4 + 6);
    ctx.fillText(i.toString(), TABLE_W + RAIL_W + 12, TABLE_H*i/4 + 6);
  }
  ctx.restore();

  drawBall(targetBall, '#cc3333', '', dragging === 'target');
  drawBall(cueBall, '#ffffff', '', dragging === 'cue');

  if (kickMode === 'diamond') {
    // 颗星模式：只画1库 + 展示计算公式
    const sol1 = solve1Rail(cueBall, targetBall);
    if (sol1) {
      for (let i = 0; i < sol1.points.length - 1; i++) {
        drawLine(sol1.points[i], sol1.points[i+1], 'rgba(255,197,51,0.7)', 2, i===0 ? null : [8,5]);
      }
      const hitPt = sol1.points[1];
      const hitDia = getDiamondNum(hitPt, sol1.rail).toFixed(1);
      drawText(hitPt, `${hitDia}${L().info.diamond}`, '#ffc533', 20);
    }
    const cueRail = cueBall.y < TABLE_H/2 ? 'top' : 'bottom';
    const targetRail = targetBall.y < TABLE_H/2 ? 'top' : 'bottom';
    const cueDia = getDiamondNum(cueBall, cueRail).toFixed(1);
    const targetDia = getDiamondNum(targetBall, targetRail).toFixed(1);
    const hitDia = sol1 ? getDiamondNum(sol1.points[1], sol1.rail).toFixed(1) : '-';
    const ki = L().info;
    const railName = sol1 ? (sol1.rail === 'top' ? ki.railTop : sol1.rail === 'bottom' ? ki.railBot : sol1.rail === 'left' ? ki.railLeft : ki.railRight) : '';
    infoEl.innerHTML = `<span class="info-tag">${ki.cue} <b>${cueDia}${ki.diamond}</b></span><span class="info-tag">${ki.target} <b>${targetDia}${ki.diamond}</b></span><span class="info-tag primary">${ki.hitPt} <b>${hitDia}${ki.diamond}(${railName})</b></span>`;
  } else {
    // 自动解球：画障碍球 + 搜索1-4库未被挡的路线
    for (const ob of kickObstacles) drawBall(ob, '#666', '');
    const all1 = solveAll1Rail(cueBall, targetBall);
    const all2 = solveAll2Rail(cueBall, targetBall);
    const all3 = solveNRail(cueBall, targetBall, 3);
    const all4 = solveNRail(cueBall, targetBall, 4);
    const open1 = all1.filter(s => !pathBlocked(s.points, kickObstacles));
    const open2 = all2.filter(s => !pathBlocked(s.points, kickObstacles));
    const open3 = all3.filter(s => !pathBlocked(s.points, kickObstacles));
    const open4 = all4.filter(s => !pathBlocked(s.points, kickObstacles));
    const colors = [
      'rgba(255,197,51,',   // 1库 橙
      'rgba(87,193,255,',   // 2库 蓝
      'rgba(150,255,130,',  // 3库 绿
      'rgba(220,150,255,',  // 4库 紫
    ];
    const openSets = [open1, open2, open3, open4];
    let routes = 0;
    openSets.forEach((openList, idx) => {
      if (openList.length > 0) {
        const sol = openList[0];
        const base = colors[idx];
        for (let i = 0; i < sol.points.length - 1; i++) {
          drawLine(sol.points[i], sol.points[i+1], base + '0.7)', idx === 0 ? 2 : 1.5, idx === 0 && i === 0 ? null : [6,4]);
        }
        if (idx === 0) {
          drawText(sol.points[1], `${getDiamondNum(sol.points[1], sol.rail).toFixed(1)}${L().info.diamond}`, '#ffc533', 20);
        }
        routes++;
      }
    });
    if (routes === 0) {
      // 全被挡，画最短1库红色提示
      if (all1.length > 0) {
        for (let i = 0; i < all1[0].points.length - 1; i++) {
          drawLine(all1[0].points[i], all1[0].points[i+1], 'rgba(255,80,80,0.4)', 2, [6,4]);
        }
      }
    }
    const kl = L().kickColors;
    const shownLabels = openSets.map((o, i) => o.length > 0 ? kl[i] : null).filter(Boolean).join(', ');
    const ki2 = L().info;
    infoEl.innerHTML = `<span class="info-tag">${ki2.mode} <b>${ki2.autoMode}</b></span><span class="info-tag primary">${ki2.routes} <b>${routes}${ki2.routeUnit}</b></span>${shownLabels ? `<span class="info-tag">(${shownLabels})</span>` : ''}${routes === 0 ? `<span class="info-tag" style="color:#ff5555">${ki2.allBlocked}</span>` : ''}`;
  }
}

// --- Module: Position ---
function drawPosition() {
  drawTable();
  const pocket = selectedPocket;
  const ghost = getGhostPos(cueBall, targetBall, pocket);
  const cutAng = getCutAngle(cueBall, targetBall, pocket);
  const cutDeg = cutAng * 180 / Math.PI;
  const pk = POCKETS[pocket];

  drawLine(targetBall, pk, 'rgba(255,255,255,0.15)', 1.5, [8,6]);
  drawLine(cueBall, ghost, 'rgba(255,197,51,0.4)', 1.5, [8,5]);

  // Draw reachable zone (fan shape)
  const cueToGhost = angle(cueBall, ghost);
  const targetToPocket = angle(ghost, pk);
  const cross = Math.sin(targetToPocket - cueToGhost);
  const stunDir = targetToPocket + (cross > 0 ? -Math.PI/2 : Math.PI/2);
  const followDeflect = 0.52 * Math.cos(cutAng);
  const drawDeflect = 1.05 * Math.cos(cutAng);
  let toShot2 = cueToGhost - stunDir;
  if (toShot2 > Math.PI) toShot2 -= 2*Math.PI;
  if (toShot2 < -Math.PI) toShot2 += 2*Math.PI;
  const ds2 = toShot2 > 0 ? 1 : -1;
  const followDir = stunDir + ds2 * followDeflect;
  const drawDir = stunDir - ds2 * drawDeflect;

  // Fan zone (only when no target set)
  if (!posTarget) {
    const fanLen = Math.min(TABLE_H * 0.1 * powerLv * powerLv, TABLE_H * 0.4);
    ctx.save(); ctx.translate(ox, oy); ctx.scale(scale, scale);
    ctx.beginPath(); ctx.rect(0, 0, TABLE_W, TABLE_H); ctx.clip();
    ctx.globalAlpha = 0.10;
    const fMin = Math.min(followDir, stunDir) - 0.1;
    const fMax = Math.max(followDir, stunDir) + 0.1;
    ctx.beginPath();
    ctx.moveTo(ghost.x, ghost.y);
    ctx.arc(ghost.x, ghost.y, fanLen, fMin, fMax);
    ctx.closePath();
    ctx.fillStyle = '#59d499'; ctx.fill();
    const dMin = Math.min(stunDir, drawDir) - 0.1;
    const dMax = Math.max(stunDir, drawDir) + 0.1;
    ctx.beginPath();
    ctx.moveTo(ghost.x, ghost.y);
    ctx.arc(ghost.x, ghost.y, fanLen, dMin, dMax);
    ctx.closePath();
    ctx.fillStyle = '#57c1ff'; ctx.fill();
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // Position target analysis — auto switch spin & power
  let recommend = '';
  if (posTarget) {
    const targetDir = Math.atan2(posTarget.y - ghost.y, posTarget.x - ghost.x);
    const targetDist = dist(ghost, posTarget);
    // 计算目标方向与各杆法分离方向的角度差
    let diffFollow = Math.abs(targetDir - followDir);
    if (diffFollow > Math.PI) diffFollow = 2*Math.PI - diffFollow;
    let diffStun = Math.abs(targetDir - stunDir);
    if (diffStun > Math.PI) diffStun = 2*Math.PI - diffStun;
    let diffDraw = Math.abs(targetDir - drawDir);
    if (diffDraw > Math.PI) diffDraw = 2*Math.PI - diffDraw;
    // 自动切换到最接近的杆法
    if (diffFollow < diffStun && diffFollow < diffDraw) { spinPt = {row:0, col:1}; }
    else if (diffDraw < diffStun && diffDraw < diffFollow) { spinPt = {row:2, col:1}; }
    else { spinPt = {row:1, col:1}; }
    // 自动切换力度
    let recPower = Math.round(Math.sqrt(targetDist / (TABLE_H * 0.1)));
    powerLv = Math.max(1, Math.min(5, recPower));
    // 方向偏差
    const recDir = spinPt.row === 0 ? followDir : spinPt.row === 2 ? drawDir : stunDir;
    let dirDiff = Math.abs(targetDir - recDir) * 180 / Math.PI;
    const dirHint = dirDiff < 5 ? L().info.dirMatch : dirDiff < 15 ? L().info.dirSlight : L().info.dirLarge;
    recommend = `<span class="info-tag primary">${dirHint}</span>`;
  }

  // Position arrow
  if (posTarget) {
    // 有目标时：箭头直接指向目标
    const targetDir = Math.atan2(posTarget.y - ghost.y, posTarget.x - ghost.x);
    const targetDist = dist(ghost, posTarget);
    drawBouncePath(ghost, targetDir, targetDist, 'rgba(255,197,51,', 0.7, null);
    // 目标标记
    ctx.save(); ctx.translate(ox, oy); ctx.scale(scale, scale);
    ctx.beginPath(); ctx.arc(posTarget.x, posTarget.y, 12, 0, Math.PI*2);
    ctx.strokeStyle = '#ffc533'; ctx.lineWidth = 3; ctx.stroke();
    ctx.beginPath(); ctx.arc(posTarget.x, posTarget.y, 3, 0, Math.PI*2);
    ctx.fillStyle = '#ffc533'; ctx.fill();
    ctx.restore();
    // 三条杆法方向各自走到力度对应长度
    const dirs = [
      {dir: followDir, color: 'rgba(255,120,80,', label: L().posLabels.follow, power: 3},
      {dir: stunDir, color: 'rgba(180,180,180,', label: L().posLabels.stun, power: 3},
      {dir: drawDir, color: 'rgba(120,200,255,', label: L().posLabels.draw, power: 3}
    ];
    dirs.forEach(d => {
      const len = TABLE_H * 0.1 * powerLv * powerLv;
      drawBouncePath(ghost, d.dir, len, d.color, 0.45, d.label);
    });
  } else {
    // 无目标时：按当前杆法画分离方向
    const spinType = getSpinType();
    let exitDir = stunDir;
    if (spinType === 'follow') exitDir = followDir;
    if (spinType === 'draw') exitDir = drawDir;
    const posLen = TABLE_H * 0.1 * powerLv * powerLv;
    drawBouncePath(ghost, exitDir, posLen, 'rgba(87,193,255,', 0.6, null);
  }

  drawBall(targetBall, '#cc3333', '', dragging === 'target');
  drawBall(cueBall, '#ffffff', '', dragging === 'cue');

  // Highlight pocket
  ctx.save(); ctx.translate(ox, oy); ctx.scale(scale, scale);
  ctx.beginPath(); ctx.arc(pk.x, pk.y, POCKET_R+6, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(255,197,51,0.5)'; ctx.lineWidth = 2; ctx.stroke();
  ctx.restore();

  const pi = L().info;
  infoEl.innerHTML = `<span class="info-tag primary">${pi.angle} <b>${cutDeg.toFixed(1)}°</b></span><span class="info-tag">${pi.spinMethod} <b>${getSpinName()}</b></span><span class="info-tag">${pi.power} <b>${powerLv}/5</b></span>${recommend}${!posTarget ? `<span class="info-tag">${pi.clickTarget}</span>` : ''}`;
}

// --- Module: DevTest ---
function devNewQuestion(retryItem) {
  devState.clicked = false;
  devState.userPt = null;
  if (retryItem) {
    cueBall = {...retryItem.cue};
    targetBall = {...retryItem.target};
    selectedPocket = retryItem.pocket;
  } else {
    // 按难度生成球位
    let attempts = 0, cutDeg = 0;
    do {
      cueBall = {x: TABLE_W*0.15 + Math.random()*TABLE_W*0.3, y: TABLE_H*0.15 + Math.random()*TABLE_H*0.7};
      targetBall = {x: TABLE_W*0.45 + Math.random()*TABLE_W*0.4, y: TABLE_H*0.15 + Math.random()*TABLE_H*0.7};
      selectedPocket = findBestPocket(cueBall, targetBall);
      cutDeg = getCutAngle(cueBall, targetBall, selectedPocket) * 180 / Math.PI;
      attempts++;
    } while (attempts < 50 && !devAngleInRange(cutDeg));
  }
  devState.history.push({cue: {...cueBall}, target: {...targetBall}, pocket: selectedPocket, userPt: null, dev: null, dirX: null, time: 0});
  devState.current = devState.history.length - 1;
  devState.startTime = Date.now();
  if (devState.timer) clearInterval(devState.timer);
  if (devState.timeLimit > 0) {
    devState.elapsed = 0;
    devState.timer = setInterval(() => {
      devState.elapsed = ((Date.now() - devState.startTime) / 1000).toFixed(1);
      const timerLabel = L().info.timer;
      infoEl.innerHTML = infoEl.innerHTML.replace(new RegExp(timerLabel + ' <b>[\\d.]+s<\\/b>'), `${timerLabel} <b>${devState.elapsed}s</b>`);
    }, 100);
  }
  draw();
}

function devAngleInRange(deg) {
  if (devState.difficulty === 'easy') return deg >= 5 && deg <= 30;
  if (devState.difficulty === 'medium') return deg > 30 && deg <= 55;
  if (devState.difficulty === 'hard') return deg > 55 && deg <= 85;
  return deg >= 5 && deg <= 85;
}

function devGoTo(index) {
  if (index < 0 || index >= devState.history.length) return;
  devState.current = index;
  const h = devState.history[index];
  cueBall = {...h.cue};
  targetBall = {...h.target};
  selectedPocket = h.pocket;
  devState.userPt = h.userPt;
  devState.clicked = !!h.userPt;
  if (devState.timer) { clearInterval(devState.timer); devState.timer = null; }
  draw(); updateControls();
}

function devGetWorst(n) {
  return devState.history.filter(h => h.dev !== null).sort((a, b) => b.dev - a.dev).slice(0, n);
}

function drawDevTest() {
  drawTable();
  const pocket = selectedPocket;
  const pk = POCKETS[pocket];

  // Only show pocket highlight and balls - no aiming aids
  ctx.save(); ctx.translate(ox, oy); ctx.scale(scale, scale);
  ctx.beginPath(); ctx.arc(pk.x, pk.y, POCKET_R+6, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(255,197,51,0.3)'; ctx.lineWidth = 2; ctx.stroke();
  ctx.restore();

  drawBall(targetBall, '#cc3333', '', dragging === 'target');
  drawBall(cueBall, '#ffffff', '', dragging === 'cue');

  if (devState.clicked) {
    const ghost = getGhostPos(cueBall, targetBall, pocket);
    // Show correct ghost ball
    ctx.save(); ctx.translate(ox, oy); ctx.scale(scale, scale);
    ctx.globalAlpha = 0.4;
    ctx.beginPath(); ctx.arc(ghost.x, ghost.y, BALL_R, 0, Math.PI*2);
    ctx.fillStyle = '#59d499'; ctx.fill();
    ctx.globalAlpha = 1;
    ctx.restore();
    // Show user click
    ctx.save(); ctx.translate(ox, oy); ctx.scale(scale, scale);
    ctx.beginPath(); ctx.arc(devState.userPt.x, devState.userPt.y, 8, 0, Math.PI*2);
    ctx.fillStyle = '#ff5555'; ctx.fill();
    ctx.restore();
    // Deviation arrow
    drawLine(devState.userPt, ghost, '#ff5555', 2);
    const devDist = dist(devState.userPt, ghost);
    const devMm = (devDist / BALL_R * 28.5).toFixed(1);
    drawText({x:(devState.userPt.x+ghost.x)/2, y:(devState.userPt.y+ghost.y)/2}, `${devMm}mm`, '#ff5555', 20);
    drawLine(cueBall, ghost, 'rgba(89,212,153,0.5)', 1.5, [8,5]);
  }

  // Scatter plot (bottom-left corner when we have answered questions)
  const answered = devState.history.filter(h => h.dev !== null);
  if (answered.length > 1) {
    const plotR = 60, plotX = 80, plotY = H - 80;
    ctx.save();
    ctx.beginPath(); ctx.arc(plotX, plotY, plotR, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1; ctx.stroke();
    // Crosshair
    ctx.beginPath(); ctx.moveTo(plotX - plotR, plotY); ctx.lineTo(plotX + plotR, plotY);
    ctx.moveTo(plotX, plotY - plotR); ctx.lineTo(plotX, plotY + plotR);
    ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.stroke();
    // Plot each answer deviation (scaled: 1 ball radius = plotR/3)
    const scl = plotR / (BALL_R * 3);
    answered.forEach((h, i) => {
      const ghost = getGhostPos(h.cue, h.target, h.pocket);
      const dx = (h.userPt.x - ghost.x) * scl;
      const dy = (h.userPt.y - ghost.y) * scl;
      const px = plotX + Math.max(-plotR+4, Math.min(plotR-4, dx));
      const py = plotY + Math.max(-plotR+4, Math.min(plotR-4, dy));
      ctx.beginPath(); ctx.arc(px, py, 3, 0, Math.PI*2);
      ctx.fillStyle = i === devState.current ? '#ffc533' : '#ff5555';
      ctx.fill();
    });
    ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(L().info.devScatter, plotX, plotY + plotR + 14);
    ctx.restore();
  }

  // Stats
  const trials = devState.trials;
  const qNum = devState.current + 1;
  const qTotal = devState.history.length;
  if (trials.length > 0) {
    const avgDev = trials.reduce((s,t) => s + t.dev, 0) / trials.length;
    const avgDir = trials.reduce((s,t) => s + t.dirX, 0) / trials.length;
    const avgTime = trials.reduce((s,t) => s + (t.time||0), 0) / trials.length;
    const di = L().info;
    const dirLabel = avgDir > 0.5 ? di.biasRight : avgDir < -0.5 ? di.biasLeft : di.biasCenter;
    const cutAng = getCutAngle(cueBall, targetBall, pocket);
    const cutDeg = (cutAng * 180 / Math.PI).toFixed(0);
    const timeStr = devState.clicked ? `${(devState.history[devState.current]?.time||0).toFixed(1)}s` : `${devState.elapsed||0}s`;
    infoEl.innerHTML = `<span class="info-tag">${di.qNum} <b>${qNum}/${qTotal}</b> ${di.qUnit}</span><span class="info-tag primary">${di.cutAngle} <b>${cutDeg}°</b></span><span class="info-tag">${di.timer} <b>${timeStr}</b></span><span class="info-tag">${di.avgDev} <b>${(avgDev/BALL_R*28.5).toFixed(1)}mm</b></span><span class="info-tag">${di.avgTime} <b>${avgTime.toFixed(1)}s</b></span><span class="info-tag">${di.dir} <b>${dirLabel}</b></span>`;
  } else {
    infoEl.innerHTML = `<span class="info-tag">${L().info.clickGhost}</span>`;
  }
}

// --- Main draw ---
function draw() {
  ctx.clearRect(0, 0, W, H);
  if (currentTab === 'aim') drawAim();
  else if (currentTab === 'train') drawTrain();
  else if (currentTab === 'hitpoint') drawHitpoint();
  else if (currentTab === 'kick') drawKick();
  else if (currentTab === 'position') drawPosition();
  else if (currentTab === 'devtest') drawDevTest();
}

      const btn = document.createElement('button');

    }
    ctrlEl.appendChild(g1);
    const g2 = makeGroup();
    const pBtn = document.createElement('button');
    pBtn.className = 'btn'; pBtn.textContent = l.btn.changePocket;

    const gBtn = document.createElement('button');

      btn.textContent = label;
      btn.onclick = () => { spinPt = {row:i, col:1}; updateControls(); draw(); };
      g1.appendChild(btn);
    });
    ctrlEl.appendChild(g1);
    const g2 = makeGroup();
    for (let p = 1; p <= 5; p++) {
      const btn = document.createElement('button');
      btn.className = 'btn' + (powerLv === p ? ' active' : '');
      btn.textContent = l.power(p);
      btn.onclick = () => { powerLv = p; updateControls(); draw(); };
      g2.appendChild(btn);
    }
    ctrlEl.appendChild(g2);
    const g3 = makeGroup();
    const clearBtn = document.createElement('button');
    clearBtn.className = 'btn warn'; clearBtn.textContent = l.btn.clearTarget;
    clearBtn.onclick = () => { posTarget = null; draw(); };
    g3.appendChild(clearBtn);

  else if (currentTab === 'devtest') {
    const g1 = makeGroup();
    if (devState.current > 0) {
      const prev = document.createElement('button');
      prev.className = 'btn'; prev.textContent = l.btn.prev;

      g1.appendChild(prev);
    }
    if (devState.clicked || devState.history.length === 0) {
      const next = document.createElement('button');
      next.className = 'btn'; next.textContent = devState.trials.length >= 10 ? l.btn.restart : l.btn.next;
      next.style.borderColor = '#ffc533'; next.style.color = '#ffc533';
      next.onclick = () => {
        if (devState.trials.length >= 10) { devState.trials = []; devState.history = []; }
        if (devState.current < devState.history.length - 1) {
          devGoTo(devState.current + 1);
        } else {
          devNewQuestion(); updateControls();
        }
      };
      g1.appendChild(next);
    }
    ctrlEl.appendChild(g1);
    const g2 = makeGroup();
    const diffs = [['mixed',l.btn.mixed],['easy',l.btn.easy],['medium',l.btn.medium],['hard',l.btn.hard]];
    diffs.forEach(([k,v]) => {
      const btn = document.createElement('button');
      btn.className = 'btn' + (devState.difficulty === k ? ' active' : '');
      btn.textContent = v;
      btn.onclick = () => { devState.difficulty = k; updateControls(); };
      g2.appendChild(btn);
    });
    ctrlEl.appendChild(g2);
    const worst = devGetWorst(3);
    if (worst.length > 0 && devState.trials.length >= 3) {
      const g3 = makeGroup();
      const retry = document.createElement('button');
      retry.className = 'btn warn'; retry.textContent = l.btn.retryWorst;
      retry.onclick = () => {
        devState.trials = []; devState.history = [];
        worst.forEach(w => { devNewQuestion(w); });
        devGoTo(0);
      };
      g3.appendChild(retry);
      ctrlEl.appendChild(g3);
    }
    if (devState.trials.length > 0) {
      const score = document.createElement('span');
      score.className = 'score';
      const avgDev = devState.trials.reduce((s,t) => s+t.dev, 0) / devState.trials.length;
      score.textContent = `${devState.trials.length}/10 | ${l.info.avgDev}${(avgDev/BALL_R*28.5).toFixed(1)}mm`;
      ctrlEl.appendChild(score);
    }
  }
}

// --- Interaction ---
function getPointerPos(e) {
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left;
  const sy = e.clientY - rect.top;
  return toTable(sx, sy);
}

function hitTest(pos) {
  if (dist(pos, cueBall) < BALL_R * 1.5) return 'cue';
  if (dist(pos, targetBall) < BALL_R * 1.5) return 'target';
  for (let i = 0; i < kickObstacles.length; i++) {
    if (dist(pos, kickObstacles[i]) < BALL_R * 1.5) return 'obstacle_' + i;
  }
  return null;
}

canvas.addEventListener('pointerdown', e => {
  const pos = getPointerPos(e);

  // Check if clicking on ball view (screen coords)
  if (currentTab === 'hitpoint' && ballViewPos) {
    const rect = canvas.getBoundingClientRect();
    const sx = e.clientX - rect.left;
    const sy = e.clientY - rect.top;
    const dxBv = sx - ballViewPos.x, dyBv = sy - ballViewPos.y;
    if (Math.sqrt(dxBv*dxBv + dyBv*dyBv) < 55) {
      draggingBallView = true;
      canvas.style.cursor = 'grabbing';
      return;
    }
  }

  if (currentTab === 'devtest' && !devState.clicked) {
    devState.clicked = true;
    devState.userPt = pos;
    const ghost = getGhostPos(cueBall, targetBall, selectedPocket);
    const dev = dist(pos, ghost);
    const dirX = pos.x - ghost.x;
    const elapsed = ((Date.now() - devState.startTime) / 1000);
    devState.trials.push({dev, dirX, time: elapsed});
    if (devState.timer) { clearInterval(devState.timer); devState.timer = null; }
    const h = devState.history[devState.current];
    if (h) { h.userPt = pos; h.dev = dev; h.dirX = dirX; h.time = elapsed; }
    draw(); updateControls();
    return;
  }

  if (currentTab === 'position') {
    const hit = hitTest(pos);
    if (!hit && pos.x > 0 && pos.x < TABLE_W && pos.y > 0 && pos.y < TABLE_H) {
      if (!hitTest(pos)) { posTarget = pos; draw(); updateControls(); return; }
    }
  }

  const hit = hitTest(pos);
  if (hit) { dragging = hit; canvas.style.cursor = 'grabbing'; }
});

canvas.addEventListener('pointermove', e => {
  if (draggingBallView) {
    const rect = canvas.getBoundingClientRect();
    ballViewPos = {x: e.clientX - rect.left, y: e.clientY - rect.top};
    draw();
    return;
  }
  if (!dragging) return;
  const pos = getPointerPos(e);
  const clamped = {
    x: Math.max(BALL_R, Math.min(TABLE_W - BALL_R, pos.x)),
    y: Math.max(BALL_R, Math.min(TABLE_H - BALL_R, pos.y))
  };
  if (dragging === 'cue') cueBall = clamped;
  else if (dragging === 'target') targetBall = clamped;
  else if (dragging.startsWith('obstacle_')) {
    kickObstacles[parseInt(dragging.split('_')[1])] = clamped;
  }
  if (currentTab === 'aim' || currentTab === 'hitpoint' || currentTab === 'position') {
    selectedPocket = findBestPocket(cueBall, targetBall);
  }
  draw();
});

canvas.addEventListener('pointerup', () => {
  dragging = null;
  draggingBallView = false;
  canvas.style.cursor = 'default';
});

// --- Tab switching ---
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentTab = tab.dataset.tab;
    if (currentTab === 'train' && trainState.total === 0) trainNewQuestion();
    if (currentTab === 'devtest' && devState.trials.length === 0) devNewQuestion();
    ctrlEl.style.opacity = '0';
    updateControls();
    draw();
    requestAnimationFrame(() => { ctrlEl.style.opacity = '1'; });
  });
});

// --- i18n functions ---
function updateTabs() {
  const tabs = L().tabs;
  document.querySelectorAll('.tab').forEach(t => {
    t.textContent = tabs[t.dataset.tab];
  });
}

function rebuildFaq() {
  const f = L().faq;
  document.getElementById('faq-title').textContent = f.title;
  const body = document.getElementById('faq-body');
  const listHtml = items => '<ul>' + items.map(i => `<li>${i}</li>`).join('') + '</ul>';
  let html = `<div class="faq-general"><h3>${f.general.title}</h3><div class="faq-text">${listHtml(f.general.items)}</div></div>`;
  const modules = ['aim','train','hitpoint','kick','position','devtest'];
  modules.forEach(m => {
    const sec = f[m];
    html += `<section><h3>${sec.title}</h3><canvas class="faq-canvas" data-faq="${m}" width="420" height="200"></canvas><div class="faq-text"><p>${sec.desc}</p>`;
    if (m === 'kick') {
      html += `<p>${sec.diamondTitle}</p>${listHtml(sec.diamondItems)}<p>${sec.autoTitle}</p>${listHtml(sec.autoItems)}`;
    } else {
      html += listHtml(sec.items);
      if (sec.sub) html += `<p>${sec.sub}</p>`;
    }
    html += '</div></section>';
  });
  body.innerHTML = html;
}

function switchLang(code) {
  curLang = code;
  localStorage.setItem('bl-lang', code);
  document.getElementById('lang-sel').value = code;
  updateTabs();
  updateControls();
  draw();
  if (document.getElementById('faq').style.display !== 'none') {
    rebuildFaq();
    drawFaqDiagrams();
  }
}

// --- FAQ Diagrams ---
function drawFaqDiagrams() {
  const c = L().canvas;
  document.querySelectorAll('.faq-canvas').forEach(cvs => {
    const ctx = cvs.getContext('2d');
    const w = cvs.width, h = cvs.height;
    const type = cvs.dataset.faq;
    ctx.fillStyle = '#1a5c2a';
    ctx.fillRect(0, 0, w, h);
    ctx.strokeStyle = '#3a3'; ctx.lineWidth = 3;
    ctx.strokeRect(4, 4, w-8, h-8);

    const drawBall = (x, y, color, r=10) => {
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2);
      ctx.fillStyle = color; ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 1; ctx.stroke();
    };
    const drawArrow = (x1, y1, x2, y2, color, dash=[]) => {
      ctx.save(); ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.setLineDash(dash);
      ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
      const ang = Math.atan2(y2-y1, x2-x1);
      ctx.setLineDash([]);
      ctx.beginPath(); ctx.moveTo(x2, y2);
      ctx.lineTo(x2 - 10*Math.cos(ang-0.4), y2 - 10*Math.sin(ang-0.4));
      ctx.lineTo(x2 - 10*Math.cos(ang+0.4), y2 - 10*Math.sin(ang+0.4));
      ctx.closePath(); ctx.fillStyle = color; ctx.fill();
      ctx.restore();
    };
    const label = (text, x, y, color='#fff', size=11) => {
      ctx.font = `${size}px sans-serif`; ctx.fillStyle = color;
      ctx.textAlign = 'center'; ctx.fillText(text, x, y);
    };

    if (type === 'aim') {
      const cx=80, cy=120, gx=180, gy=100, tx=220, ty=85, px=380, py=30;
      drawArrow(cx, cy, gx, gy, '#ffcc00', [5,4]);
      drawBall(gx, gy, 'rgba(0,255,100,0.3)', 12);
      drawBall(tx, ty, '#e33', 10);
      drawBall(cx, cy, '#fff', 10);
      drawArrow(tx, ty, px, py, 'rgba(255,255,255,0.7)', [4,3]);
      label(c.cueBall, cx, cy+24, '#ccc');
      label(c.ghostBall, gx, gy+24, '#8f8');
      label(c.targetBall, tx, ty-16, '#f88');
      label(c.pocket, px, py+20, '#ccc');
      ctx.beginPath();
      const a1 = Math.atan2(gy-ty, gx-tx), a2 = Math.atan2(py-ty, px-tx);
      ctx.arc(tx, ty, 30, a2, a1); ctx.strokeStyle='#ff0'; ctx.lineWidth=1.5; ctx.setLineDash([]); ctx.stroke();
      label(c.cutAngle, tx+35, ty+5, '#ff0');
    }
    else if (type === 'train') {
      drawBall(100, 120, '#fff', 10);
      drawBall(250, 80, '#e33', 10);
      const opts = ['15°','30°','45°','60°','75°'];
      opts.forEach((o, i) => {
        const bx = 60 + i*70, by = 170;
        ctx.fillStyle = i===2 ? '#4a4' : '#333';
        ctx.fillRect(bx-22, by-12, 44, 24);
        ctx.strokeStyle = '#666'; ctx.lineWidth=1; ctx.strokeRect(bx-22, by-12, 44, 24);
        label(o, bx, by+4, '#fff', 11);
      });
      drawArrow(100, 120, 250, 80, '#ffcc00', [4,3]);
      label(c.randomSetup, 175, 40, '#aaa', 12);
      label(c.chooseAngle, 175, 155, '#aaa', 11);
    }
    else if (type === 'hitpoint') {
      const bx=340, by=50;
      ctx.beginPath(); ctx.arc(bx, by, 30, 0, Math.PI*2);
      ctx.fillStyle='#fff'; ctx.fill(); ctx.strokeStyle='#888'; ctx.lineWidth=1; ctx.stroke();
      ctx.beginPath(); ctx.arc(bx, by-12, 4, 0, Math.PI*2); ctx.fillStyle='#e33'; ctx.fill();
      label(c.hitPtFace, bx, by+48, '#ccc', 10);
      const cx=60, cy=130, tx=180, ty=90;
      drawBall(cx, cy, '#fff', 9);
      drawBall(tx, ty, '#e33', 9);
      const gx=tx-20, gy=ty+12;
      drawArrow(gx, gy, gx-50, gy-50, 'rgba(255,120,80,0.8)');
      drawArrow(gx, gy, gx+30, gy-55, 'rgba(180,180,180,0.8)');
      drawArrow(gx, gy, gx+60, gy+10, 'rgba(120,200,255,0.8)');
      label(c.follow, gx-55, gy-55, '#f87', 10);
      label(c.stun, gx+35, gy-60, '#bbb', 10);
      label(c.draw, gx+70, gy+5, '#8cf', 10);
    }
    else if (type === 'kick') {
      drawBall(60, 150, '#fff', 9);
      drawBall(340, 140, '#e33', 9);
      const rx=200, ry=8;
      drawArrow(60, 150, rx, ry, '#f80', []);
      drawArrow(rx, ry, 340, 140, '#f80', [5,3]);
      ctx.beginPath(); ctx.arc(rx, ry, 5, 0, Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();
      label(c.rail1, 200, 40, '#f80', 10);
      ctx.setLineDash([3,3]); ctx.strokeStyle='#48f'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(60,150); ctx.lineTo(30,80); ctx.lineTo(150,8); ctx.lineTo(340,140); ctx.stroke();
      ctx.setLineDash([]);
      label(c.rail2, 80, 65, '#48f', 10);
      drawBall(200, 100, '#555', 9);
      label(c.obs, 200, 120, '#888', 9);
    }
    else if (type === 'position') {
      const cx=100, cy=130, gx=180, gy=90;
      drawBall(cx, cy, '#fff', 9);
      drawBall(210, 80, '#e33', 9);
      ctx.save(); ctx.globalAlpha = 0.2;
      ctx.beginPath(); ctx.moveTo(gx, gy);
      ctx.arc(gx, gy, 70, -2.2, -1.2); ctx.closePath();
      ctx.fillStyle='#4f4'; ctx.fill();
      ctx.beginPath(); ctx.moveTo(gx, gy);
      ctx.arc(gx, gy, 70, -0.5, 0.5); ctx.closePath();
      ctx.fillStyle='#4af'; ctx.fill();
      ctx.restore();
      ctx.beginPath(); ctx.arc(300, 50, 8, 0, Math.PI*2);
      ctx.strokeStyle='#ff0'; ctx.lineWidth=2; ctx.stroke();
      label(c.target, 300, 70, '#ff0', 10);
      drawArrow(gx, gy, 300, 50, '#f80', [4,3]);
      label(c.followZone, gx-40, gy-50, '#8f8', 10);
      label(c.drawZone, gx+50, gy+10, '#8cf', 10);
    }
    else if (type === 'devtest') {
      const sx=30, sy=30, sw=120, sh=120;
      ctx.strokeStyle='#555'; ctx.lineWidth=1;
      ctx.strokeRect(sx, sy, sw, sh);
      ctx.beginPath(); ctx.moveTo(sx+sw/2, sy); ctx.lineTo(sx+sw/2, sy+sh);
      ctx.moveTo(sx, sy+sh/2); ctx.lineTo(sx+sw, sy+sh/2);
      ctx.strokeStyle='#444'; ctx.stroke();
      const dots = [[50,60,'#e33'],[70,80,'#e33'],[90,50,'#e33'],[85,95,'#e33'],[60,100,'#e33'],[100,70,'#ff0']];
      dots.forEach(([dx,dy,cl]) => { ctx.beginPath(); ctx.arc(dx,dy,4,0,Math.PI*2); ctx.fillStyle=cl; ctx.fill(); });
      label(c.scatter, sx+sw/2, sy+sh+16, '#aaa', 10);
      label(c.historyDot, sx+sw/2-20, sy+sh+30, '#e33', 9);
      label(c.currentDot, sx+sw/2+30, sy+sh+30, '#ff0', 9);
      const fx=220, fy=40;
      label(c.flow, fx, fy, '#ccc', 12);
      label(c.flowDesc, fx+80, fy+20, '#aaa', 11);
      label(c.diffLabel, fx+60, fy+50, '#aaa', 11);
      label(c.after10, fx+60, fy+75, '#aaa', 11);
      label(c.retryWorst, fx+40, fy+100, '#aaa', 11);
    }
  });
}

// --- Init ---
document.getElementById('lang-sel').value = curLang;
updateTabs();
selectedPocket = findBestPocket(cueBall, targetBall);
resize();
updateControls();
</script>
